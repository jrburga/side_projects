<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Turmites × Game of Life</title>
<style>
  body {
    background: #1a1a1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
    gap: 10px;
    font-family: monospace;
    color: #ccc;
  }
  h2 { margin: 0; }
  canvas {
    width: 600px;
    height: 600px;
    image-rendering: pixelated;
    border: 1px solid #444;
  }
  #info { font-size: 13px; letter-spacing: 1px; }
  button {
    font-family: monospace;
    font-size: 12px;
    background: #333;
    color: #ccc;
    border: 1px solid #555;
    padding: 4px 12px;
    cursor: pointer;
  }
  button:hover { background: #444; }
</style>
</head>
<body>
<h2>Turmites × Game of Life</h2>
<canvas id="c" width="300" height="300"></canvas>
<div id="info">Step 0 | Pop: 50</div>
<button id="btn">Restart</button>
<script>
const W = 100, H = 100;
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const infoEl = document.getElementById('info');

const rnd = (lo, hi) => Math.floor(Math.random() * (hi - lo + 1)) + lo;
const DIRS = [[1,0],[0,1],[-1,0],[0,-1]];

// 4 cell values: 0=dead(white), 1=GoL-alive(near-black), 2=mid-gray, 3=light-gray
const CELL_COLORS = ['#fff', '#111', '#555', '#aaa'];

const ASEXUAL_THRESHOLD = 75;
const ASEXUAL_COST      = 30;
const SEXUAL_MIN        = 20;
const SEXUAL_COST       = 10;
const CHILD_ENERGY      = 25;
const MAX_POP           = 300; // used in asexual probability formula

// --- Grid ---

function makeGrid() {
  return {
    buf: 0,
    cells: Array.from({length: H}, () =>
      Array.from({length: W}, () => [Math.random() < 1/21 ? 1 : 0, 0])
    )
  };
}

function golStep(grid) {
  const c = grid.buf, nc = 1 - c;
  const cells = grid.cells;
  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      let n = 0;
      cells[y][x][nc] = cells[y][x][c];
      for (let dy = -1; dy <= 1; dy++) {
        for (let dx = -1; dx <= 1; dx++) {
          if (dx === 0 && dy === 0) continue;
          if (cells[(y+dy+H)%H][(x+dx+W)%W][c] > 0) n++;
        }
      }
      if (cells[y][x][c] > 0) { if (n < 2 || n > 3) cells[y][x][nc] = 0; }
      else                    { if (n === 3)          cells[y][x][nc] = 1; }
    }
  }
  grid.buf = nc;
}

// --- Genome: 96-bit string ---
// Bits  0-31: nextState table  [state][cellColor] → new state (0-3)
// Bits 32-63: cellWrite table  [state][cellColor] → cell value to write (0-3)
// Bits 64-95: turn table       [state][cellColor] → 0=straight 1=right 2=uturn 3=left
// Entry [s][c] starts at tableOffset + (s*4 + c)*2

function randomChrom() {
  return Array.from({length: 96}, () => Math.random() < 0.5 ? '0' : '1').join('');
}

function decodeChrom(t) {
  const c = t.chrom;
  t.nextState = [];
  t.cellWrite = [];
  t.turn      = [];
  for (let s = 0; s < 4; s++) {
    t.nextState.push([]);
    t.cellWrite.push([]);
    t.turn.push([]);
    for (let cv = 0; cv < 4; cv++) {
      const e = s * 4 + cv;
      t.nextState[s].push(parseInt(c.slice( 0 + e*2,  2 + e*2), 2));
      t.cellWrite[s].push(parseInt(c.slice(32 + e*2, 34 + e*2), 2));
      t.turn[s].push(     parseInt(c.slice(64 + e*2, 66 + e*2), 2));
    }
  }
  // Color from first byte of each table section
  t.color = [0, 32, 64].map(i => parseInt(c.slice(i, i + 8), 2));
}

// --- Turmites ---

function makeTurmite(chrom) {
  if (!chrom) chrom = randomChrom();
  const t = {
    alive: true,
    energy: 50,
    dir: rnd(0, 3),
    pos: [rnd(0, W-1), rnd(0, H-1)],
    state: rnd(0, 3),
    chrom,
    nextState: null, cellWrite: null, turn: null, color: null,
    parents: null,
  };
  decodeChrom(t);
  return t;
}

function stepTurmite(t, grid) {
  t.energy--;
  const a = grid.buf;
  const s = t.state;
  let [x, y] = t.pos;

  const c = grid.cells[y][x][a];
  const nc = t.cellWrite[s][c];
  t.state = t.nextState[s][c];
  grid.cells[y][x][a] = nc;

  if (c > 0) { if (nc === 0) t.energy--; }
  else       { if (nc > 0)  t.energy++; }

  t.dir = (t.dir + t.turn[s][c]) % 4;
  t.pos = [
    (x + DIRS[t.dir][0] + W) % W,
    (y + DIRS[t.dir][1] + H) % H,
  ];
}

function killTurmite(t, grid) {
  const [x, y] = t.pos;
  grid.cells[y][x][grid.buf] = 1;
  t.alive = false;
}

// --- Genetics ---

function crossover(t1, t2) {
  const split = rnd(1, 95);
  const s = rnd(0, 1);
  const chroms = [t1.chrom, t2.chrom];
  return chroms[s].slice(0, split) + chroms[1-s].slice(split);
}

function mutate(chrom) {
  const bits = chrom.split('');
  const n = rnd(1, 3);
  for (let i = 0; i < n; i++) {
    const idx = rnd(0, 95);
    bits[idx] = bits[idx] === '0' ? '1' : '0';
  }
  return bits.join('');
}

function spawnAt(pos, chrom, parents) {
  const child = makeTurmite(chrom);
  child.energy = CHILD_ENERGY;
  child.pos = [...pos];
  child.parents = parents;
  return child;
}

// --- Render ---

function render(grid, turmites) {
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, 300, 300);

  const a = grid.buf;
  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      const v = grid.cells[y][x][a];
      if (v > 0) {
        ctx.fillStyle = CELL_COLORS[v];
        ctx.fillRect(x*3, y*3, 2, 2);
      }
    }
  }

  for (const t of turmites) {
    if (!t.alive) continue;
    const [x, y] = t.pos;
    ctx.fillStyle = `rgb(${t.color[0]},${t.color[1]},${t.color[2]})`;
    ctx.fillRect(x*3, y*3, 2, 2);
  }
}

// --- Main loop ---

let grid, turmites, steps;

function init() {
  grid = makeGrid();
  turmites = Array.from({length: 50}, () => makeTurmite());
  steps = 0;
}

function tick() {
  steps++;
  golStep(grid);

  const pop = turmites.filter(t => t.alive).length;
  const asexualProb = Math.max(0, 1 - pop / MAX_POP);
  const posMap = new Map();
  const newborn = [];

  for (const t of turmites) {
    if (!t.alive) continue;
    stepTurmite(t, grid);

    if (t.energy < 1) {
      killTurmite(t, grid);
      continue;
    }

    // Asexual reproduction: probability inversely proportional to population
    if (t.energy > ASEXUAL_THRESHOLD && Math.random() < asexualProb) {
      t.energy -= ASEXUAL_COST;
      newborn.push(spawnAt(t.pos, mutate(t.chrom), [t, null]));
    }

    // Sexual reproduction: same-cell contact
    const key = `${t.pos[0]},${t.pos[1]}`;
    if (posMap.has(key)) {
      const other = posMap.get(key);
      if (t.energy > SEXUAL_MIN && other.energy > SEXUAL_MIN) {
        t.energy -= SEXUAL_COST;
        other.energy -= SEXUAL_COST;
        newborn.push(spawnAt(t.pos, mutate(crossover(t, other)), [t, other]));
        posMap.delete(key);
      }
    } else {
      posMap.set(key, t);
    }
  }

  turmites = turmites.filter(t => t.alive).concat(newborn);

  if (turmites.length === 0) {
    turmites = Array.from({length: 50}, () => makeTurmite());
  }

  render(grid, turmites);
  infoEl.textContent = `Step ${steps} | Pop: ${turmites.length}`;
}

document.getElementById('btn').addEventListener('click', init);

init();
setInterval(tick, 1000 / 15);
</script>
</body>
</html>
